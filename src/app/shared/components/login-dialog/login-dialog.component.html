<p-dialog
  [(visible)]="authService.showLoginDialog"
  [modal]="true"
  [dismissableMask]="true"
  [closable]="true"
  [draggable]="false"
  [resizable]="false"
  [showHeader]="false"
  [style]="{ width: '92vw', maxWidth: '420px' }"
  [styleClass]="'dialog-enter !rounded-2xl !border-0 overflow-hidden !bg-white dark:!bg-[#120822]'"
  [contentStyle]="{ padding: '0', background: 'transparent' }">

  <div class="p-8 bg-transparent">
    <!-- Logo -->
    <div class="flex justify-center mb-6">
      <img src="assets/logo.avif" alt="Calmi" class="h-12">
    </div>

    <!-- Heading -->
    <h2 class="text-2xl font-bold text-center text-gray-900 dark:text-gray-100 mb-2">Welcome back</h2>
    <p class="text-center text-gray-500 dark:text-gray-400 text-sm mb-8">Rejoin your space of calm</p>

    <!-- Form -->
    <form (ngSubmit)="onSubmit()" class="space-y-4">
      <div>
        <input type="email" placeholder="Email address"
               class="w-full px-4 py-3 rounded-xl bg-gray-50 dark:bg-white/5 border border-gray-200 dark:border-white/10 text-gray-900 dark:text-gray-100 placeholder-gray-400 dark:placeholder-gray-500 focus:border-brand focus:ring-1 focus:ring-brand focus:bg-white dark:focus:bg-white/10 transition-all outline-none">
      </div>
      <div>
        <input type="password" placeholder="Password"
               class="w-full px-4 py-3 rounded-xl bg-gray-50 dark:bg-white/5 border border-gray-200 dark:border-white/10 text-gray-900 dark:text-gray-100 placeholder-gray-400 dark:placeholder-gray-500 focus:border-brand focus:ring-1 focus:ring-brand focus:bg-white dark:focus:bg-white/10 transition-all outline-none">
      </div>

      <div class="flex justify-end">
        <a href="#" class="text-xs text-brand hover:underline">Forgot password?</a>
      </div>

      <app-primary-button label="Sign In" class="flex [&_button]:w-full [&_button]:justify-center" />
    </form>

    <!-- Divider -->
    <div class="flex items-center gap-4 my-6">
      <div class="flex-1 h-px bg-gray-200 dark:bg-white/10"></div>
      <span class="text-xs text-gray-400">or</span>
      <div class="flex-1 h-px bg-gray-200 dark:bg-white/10"></div>
    </div>

    <!-- Google Sign In -->
    <button class="w-full flex items-center justify-center gap-3 px-4 py-3 rounded-xl border border-gray-200 dark:border-white/10 bg-white dark:bg-white/5 hover:bg-gray-50 dark:hover:bg-white/10 transition-all text-gray-700 dark:text-gray-100 font-medium text-sm">
      <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Continue with Google
    </button>

    <!-- Sign up link -->
    <p class="text-center text-sm text-gray-500 dark:text-gray-400 mt-6">
      Don't have an account? <a href="#" class="text-brand font-semibold hover:underline">Sign up</a>
    </p>
  </div>
</p-dialog>
